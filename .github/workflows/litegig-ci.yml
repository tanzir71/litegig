name: GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Static asset syntax
        run: |
          node --check litegig-pwa.js
          node --check litegig-sw.js
          php -r 'json_decode(file_get_contents("manifest.webmanifest"), true, 512, JSON_THROW_ON_ERROR); echo "manifest JSON OK\n";'

      - name: GitHub Pages config
        run: php tools/validate_pages_config.php

      - name: Landing page smoke
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            index.html
            docs.html
            offline.html
            manifest.webmanifest
            styles/tokens.css
            brand/favicon.svg
            brand/logo-lockup.svg
            brand/logo-mark.svg
          )

          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty Pages asset: $file"
              exit 1
            fi
          done

          tmpdir="$(mktemp -d)"
          server_log="$tmpdir/server.log"
          server_pid=""
          cleanup() {
            exit_code=$?
            if [[ -n "${server_pid:-}" ]]; then
              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
            fi
            if [[ "$exit_code" -ne 0 && -f "$server_log" ]]; then
              echo "::group::Static server log"
              cat "$server_log"
              echo "::endgroup::"
            fi
            rm -rf "$tmpdir"
            exit "$exit_code"
          }
          trap cleanup EXIT

          php -S 127.0.0.1:0 -t . > "$server_log" 2>&1 &
          server_pid=$!

          base_url=""
          for _ in {1..50}; do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "Static server exited before startup."
              exit 1
            fi
            base_url="$(sed -nE 's#.*Development Server \((http://127\.0\.0\.1:[0-9]+)\) started.*#\1#p' "$server_log" | tail -n 1)"
            if [[ -n "$base_url" ]]; then
              break
            fi
            sleep 0.1
          done

          if [[ -z "$base_url" ]]; then
            echo "Static server did not announce a listening URL."
            exit 1
          fi

          for path in /index.html /docs.html /offline.html /manifest.webmanifest /styles/tokens.css; do
            php -r '
              $ctx = stream_context_create(["http" => ["timeout" => 2, "ignore_errors" => true]]);
              $body = file_get_contents($argv[1], false, $ctx);
              $status = 0;
              foreach ($http_response_header ?? [] as $line) {
                  if (preg_match("/^HTTP\/\S+\s+(\d+)/", $line, $m)) $status = (int) $m[1];
              }
              if ($status !== 200 || $body === false || $body === "") {
                  fwrite(STDERR, "Static smoke failed for {$argv[1]} with HTTP {$status}\n");
                  exit(1);
              }
            ' "$base_url$path"
          done

          echo "GitHub Pages static smoke passed."
